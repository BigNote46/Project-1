<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <!--ส่วนแสดงชื่อเว็บ-->
   <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary"><i class="fa-solid fa-wallet"></i> Smart Budget Planner</h1>
            <p class="text-muted">วางแผนการเงินและคำนวณงบประมาณรายเดือนแบบง่ายๆ</p>
        </header>
        <!--ส่วนคอลัมน์แสดงยอดเงินต่างๆ-->
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card bg-white border-0 shadow-sm p-4 text-center h-100">
                    <h5 class="text-muted">รายได้ทั้งหมด</h5>
                    <br><h2 class="text-success fw-bold" id="total-income-display">0 ฿</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-white border-0 shadow-sm p-4 text-center h-100">
                    <h5 class="text-muted">เงินออมเป้าหมาย (20%)</h5>
                    <h2 class="text-info fw-bold" id="savings-display">0 ฿</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-white border-0 shadow-sm p-4 text-center h-100">
                    <h5 class="text-muted">งบประมาณที่ใช้ได้ (80%)</h5>
                    <h2 class="text-warning fw-bold" id="budget-left-display">0 ฿</h2>
                </div>
            </div>
        </div>
        <!--ส่วนคอลัมน์บันทึกรายได้-->
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm p-4 mb-4">
                    <h4 class="mb-3 text-secondary"><i class="fa-solid fa-money-bill-wave text-success"></i> ระบุรายได้ของคุณ</h4>
                    <div class="input-group">
                        <input type="number" id="income-input" class="form-control" placeholder="ระบุจำนวนเงิน (บาท)">
                        <button class="btn btn-success" id="save-income-btn" type="button">บันทึกรายได้</button>
                    </div>
                </div>
                <!--ส่วนคอลัมน์บันทึกรายจ่าย-->
                <div class="card border-0 shadow-sm p-4">
                    <h4 class="mb-3 text-secondary"><i class="fa-solid fa-cart-shopping text-danger"></i> บันทึกรายจ่าย</h4>
                    <div class="mb-3">
                        <label for="expense-name" class="form-label">ชื่อรายการ</label>
                        <input type="text" id="expense-name" class="form-control" placeholder="เช่น ค่าชาบู, ค่าหอ">
                    </div>
                    <div class="mb-3">
                        <label for="expense-amount" class="form-label">จำนวนเงิน (บาท)</label>
                        <input type="number" id="expense-amount" class="form-control" placeholder="0">
                    </div>
                    <div class="mb-3">
                        <label for="expense-category" class="form-label">หมวดหมู่</label>
                        <select id="expense-category" class="form-select">
                            <option value="อาหาร">🍔 อาหาร</option>
                            <option value="เดินทาง">🚗 เดินทาง</option>
                            <option value="ที่พัก">🏠 ที่พัก/ค่าน้ำไฟ</option>
                            <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง/บันเทิง</option>
                            <option value="อื่นๆ">📦 อื่นๆ</option>
                        </select>
                    </div>
                    <button class="btn btn-danger w-100" id="add-expense-btn" type="button">เพิ่มรายการรายจ่าย</button>
                </div>
            </div>
            <!--ส่วนคอลัมน์แสดงประวัติรายจ่าย-->
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h4 class="mb-3 text-secondary"><i class="fa-solid fa-list"></i> ประวัติรายการรายจ่าย</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>รายการ</th>
                                    <th>หมวดหมู่</th>
                                    <th>จำนวนเงิน</th>
                                    <th class="text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="expense-list">
                                </tbody>
                        </table>
                    </div>
                    <div id="no-data-alert" class="text-center text-muted py-4">
                        ยังไม่มีข้อมูลรายจ่ายในเดือนนี้
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--ส่วนดึงข้อมูลจาก javaScript มาใส่-->
    <script src="app.js"></script>
</body>
</html>
